version: '3.9'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/code
      - static_volume:/code/static
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./.env

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/redis

  celery:
    build: .
    command: celery -A config worker -l INFO -P eventlet
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
      - web
    env_file:
      - ./.env

  celery-beat:
    build: .
    command: celery -A config beat -l INFO
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
      - web
    env_file:
      - ./.env

#
volumes:
  postgres_data:
  static_volume:
  redis_data: